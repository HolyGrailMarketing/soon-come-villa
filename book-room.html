<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Book a Room – Soon Come Villa</title>
  <meta content="Reserve a single ensuite room at Soon Come Villa in Runaway Bay, Jamaica." name="description">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link href="css/normalize.css" rel="stylesheet" type="text/css">
  <link href="css/webflow.css" rel="stylesheet" type="text/css">
  <link href="css/soon-come-villa-7c6e6b.webflow.css" rel="stylesheet" type="text/css">
  <link href="images/favicon.png" rel="shortcut icon" type="image/x-icon">
  <link href="images/webclip.png" rel="apple-touch-icon">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    .flatpickr-day.selected,.flatpickr-day.startRange,.flatpickr-day.endRange{background:#ecb306!important;color:#fff!important}
    input.flatpickr-input.Date,input.date{background-color:#f2f2f2!important;border:none!important;border-radius:.375rem!important;padding:.75rem 1rem!important;width:100%!important;font-size:1rem!important;color:#333!important}
    .booking-card{max-width:520px;margin:2rem auto;padding:2rem;border-radius:.75rem;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    .booking-card label{display:block;margin:.75rem 0 .25rem;font-weight:600;font-size:.9rem}
    .booking-card input{width:100%;background:#f2f2f2;border:none;border-radius:.375rem;padding:.75rem 1rem;font-size:1rem}
    .price-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1rem}
    .price-row .amount{font-size:1.75rem;font-weight:700}
    #book-msg{display:none;margin:.5rem 0;font-size:.9rem;color:#b00}
  </style>
</head>
<body>
  <div class="navbar-logo-center">
    <div role="banner" class="navbar-logo-center-container shadow-three w-nav">
      <div class="container">
        <div class="navbar-wrapper-three">
          <a href="index.html" class="navbar-brand-three w-nav-brand"><img src="images/SOON-COME-logo2.avif" width="360" alt="Soon Come Villa Logo" class="image-2"></a>
          <nav role="navigation" class="nav-menu-wrapper-three w-nav-menu">
            <div class="nav-menu-three">
              <ul role="list" class="nav-menu-block w-list-unstyled">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="ballroom.html" class="nav-link">Events</a></li>
                <li><a href="contact-us.html" class="nav-link">Contact</a></li>
              </ul>
              <ul role="list" class="nav-menu-block w-list-unstyled">
                <li class="mobile-margin-top-10"><a href="rooms.html" class="button button-primary w-button">Book Now</a></li>
              </ul>
            </div>
          </nav>
        </div>
      </div>
    </div>
  </div>

  <section class="section-9">
    <div class="booking-card">
      <h1 class="heading-23" style="font-size:2rem;">Book a Room</h1>
      <p class="paragraph-9">A cozy ensuite retreat with shared access to the pool and gardens. We'll assign one of our available rooms for your dates.</p>
      <div class="price-row">
        <div><span class="amount" id="total-price">US $320</span> <span id="night-count" style="color:#777;">2 Nights</span></div>
        <div style="color:#777;"><span id="room-rate">$160</span>/night · 2 night min</div>
      </div>
      <form id="book-room-form">
        <label for="date-range">Select Dates</label>
        <input class="date" id="date-range" placeholder="Select Dates" type="text" autocomplete="off">
        <input type="hidden" id="check-in"><input type="hidden" id="check-out">
        <label for="First-Name">First Name</label><input id="First-Name" type="text">
        <label for="Last-Name">Last Name</label><input id="Last-Name" type="text">
        <label for="Email">Email</label><input id="Email" type="email">
        <label for="Phone-Number">Phone</label><input id="Phone-Number" type="text">
        <label for="guest-count">Number of Guests</label><input id="guest-count" type="number" min="1" max="2" value="1">
        <div id="book-msg"></div>
        <div style="margin-top:1.25rem;"><input type="submit" id="reserve" class="button w-button" value="Reserve"></div>
        <div id="dimepay-widget" style="display:none;margin-top:1rem;"></div>
      </form>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script type="module">
    import { formatYMD, fetchUnits, checkAvailability, createBooking, mountDimePay, setMessage }
      from './js/booking.js';

    const rangeInput = document.getElementById('date-range');
    const hiddenIn = document.getElementById('check-in');
    const hiddenOut = document.getElementById('check-out');
    const guestInput = document.getElementById('guest-count');
    const totalEl = document.getElementById('total-price');
    const nightCountEl = document.getElementById('night-count');
    const reserveBtn = document.getElementById('reserve');
    const formEl = document.getElementById('book-room-form');

    let rate = 160, maxGuests = 2, available = false;
    fetchUnits().then((u) => {
      if (u['room-1']) {
        rate = Number(u['room-1'].nightly_rate) || rate;
        maxGuests = u['room-1'].max_guests || maxGuests;
        guestInput.max = maxGuests;
        document.getElementById('room-rate').textContent = '$' + rate.toLocaleString('en-US');
        renderPrice(0);
      }
    }).catch(() => {});

    function renderPrice(nights) {
      totalEl.textContent = 'US $' + ((nights * rate) || rate).toLocaleString('en-US');
      nightCountEl.textContent = nights >= 1 ? nights + (nights === 1 ? ' Night' : ' Nights') : '2 Nights';
    }
    function resetDates() { hiddenIn.value = ''; hiddenOut.value = ''; available = false; renderPrice(0); }

    const fp = flatpickr(rangeInput, {
      mode: 'range', dateFormat: 'Y-m-d', altInput: true, altFormat: 'F j, Y', minDate: 'today',
      showMonths: window.matchMedia('(max-width: 767px)').matches ? 1 : 2,
      onChange: async (dates) => {
        setMessage('book-msg', '');
        if (dates.length < 2) { resetDates(); return; }
        const nights = Math.round((dates[1] - dates[0]) / 86400000);
        if (nights < 2) { alert('Please select at least 2 nights.'); fp.clear(); resetDates(); return; }
        hiddenIn.value = formatYMD(dates[0]); hiddenOut.value = formatYMD(dates[1]);
        renderPrice(nights);
        try {
          const a = await checkAvailability({ unit: 'room', checkIn: hiddenIn.value, checkOut: hiddenOut.value });
          available = a.available;
          if (!a.available) setMessage('book-msg', 'No rooms are available for those dates. Please choose another range.', 'error');
        } catch { available = true; }
      },
    });

    formEl.addEventListener('submit', async (evt) => {
      evt.preventDefault();
      setMessage('book-msg', '');
      const guests = parseInt(guestInput.value, 10);
      if (!hiddenIn.value || !hiddenOut.value) { setMessage('book-msg', 'Please select your dates.', 'error'); return; }
      if (isNaN(guests) || guests < 1 || guests > maxGuests) { setMessage('book-msg', `Enter 1–${maxGuests} guests.`, 'error'); return; }
      if (!available) { setMessage('book-msg', 'No rooms available for those dates.', 'error'); return; }
      reserveBtn.disabled = true; reserveBtn.value = 'Please wait...';
      try {
        const booking = await createBooking({
          unit: 'room', checkIn: hiddenIn.value, checkOut: hiddenOut.value, guests,
          firstName: document.getElementById('First-Name').value.trim(),
          lastName: document.getElementById('Last-Name').value.trim(),
          email: document.getElementById('Email').value.trim(),
          phone: document.getElementById('Phone-Number').value.trim(),
        });
        await mountDimePay(booking);
      } catch (err) {
        setMessage('book-msg', err.message || 'Something went wrong. Please try again.', 'error');
        reserveBtn.disabled = false; reserveBtn.value = 'Reserve';
      }
    });
  </script>
</body>
</html>
