<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Admin – Soon Come Villa</title>
  <meta name="robots" content="noindex">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <style>
    body{font-family:Montserrat,system-ui,sans-serif;margin:0;background:#faf9f6;color:#222}
    header{background:#111;color:#d4af37;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
    header h1{font-size:1.1rem;margin:0}
    main{max-width:1100px;margin:1.5rem auto;padding:0 1rem}
    .card{background:#fff;border-radius:.5rem;box-shadow:0 4px 16px rgba(0,0,0,.06);padding:1.25rem;margin-bottom:1.25rem}
    label{font-size:.8rem;font-weight:600;display:block;margin:.5rem 0 .2rem}
    input,select{padding:.5rem;border:1px solid #ddd;border-radius:.375rem;font-size:.9rem}
    button{background:#d4af37;color:#111;border:none;border-radius:.375rem;padding:.5rem .9rem;font-weight:600;cursor:pointer}
    button.secondary{background:#eee;color:#333}
    button.danger{background:#c0392b;color:#fff}
    table{width:100%;border-collapse:collapse;font-size:.85rem}
    th,td{text-align:left;padding:.5rem;border-bottom:1px solid #eee;white-space:nowrap}
    .filters{display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end}
    .pill{padding:.15rem .5rem;border-radius:1rem;font-size:.75rem;font-weight:600}
    .s-paid{background:#e3f5df;color:#127a00}.s-pending{background:#fff3d6;color:#9a7400}
    .s-cancelled,.s-expired{background:#eee;color:#666}.s-refunded{background:#e0ecff;color:#1452b8}
    .row-actions{display:flex;gap:.4rem}
    #login{max-width:360px;margin:4rem auto}
    .msg{font-size:.85rem;margin:.5rem 0}.msg.err{color:#c0392b}.msg.ok{color:#127a00}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    dialog{border:none;border-radius:.5rem;padding:1.5rem;max-width:420px}
  </style>
</head>
<body>
  <div id="login" class="card" style="display:none;">
    <h1>Admin Login</h1>
    <label>Email</label><input id="login-email" type="email" style="width:100%">
    <label>Password</label><input id="login-pass" type="password" style="width:100%">
    <div class="msg err" id="login-msg"></div>
    <button id="login-btn" style="margin-top:1rem;width:100%">Sign in</button>
  </div>

  <div id="app" style="display:none;">
    <header>
      <h1>Soon Come Villa — Admin</h1>
      <button class="secondary" id="logout-btn">Log out</button>
    </header>
    <main>
      <div class="card">
        <h2 style="margin-top:0">Bookings</h2>
        <div class="filters">
          <div><label>Status</label>
            <select id="f-status"><option value="">All</option><option>pending</option><option>paid</option><option>cancelled</option><option>refunded</option><option>expired</option></select>
          </div>
          <div><label>Unit</label>
            <select id="f-unit"><option value="">All</option><option>entire-villa</option><option>room-1</option><option>room-2</option><option>room-3</option><option>room-4</option><option>ballroom</option></select>
          </div>
          <div><label>From (check-in)</label><input id="f-from" type="date"></div>
          <div><label>To (check-in)</label><input id="f-to" type="date"></div>
          <button id="f-apply">Apply</button>
        </div>
        <div id="bookings-msg" class="msg"></div>
        <div style="overflow:auto;margin-top:1rem;">
          <table>
            <thead><tr><th>Created</th><th>Guest</th><th>Unit</th><th>Dates</th><th>Guests</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="bookings-body"></tbody>
          </table>
        </div>
      </div>

      <div class="grid2">
        <div class="card">
          <h2 style="margin-top:0">Block Dates</h2>
          <label>Unit</label>
          <select id="b-unit"><option>entire-villa</option><option>room-1</option><option>room-2</option><option>room-3</option><option>room-4</option><option>ballroom</option></select>
          <label>From</label><input id="b-from" type="date">
          <label>To (exclusive)</label><input id="b-to" type="date">
          <label>Reason</label><input id="b-reason" type="text" style="width:100%">
          <div class="msg" id="block-msg"></div>
          <button id="block-btn" style="margin-top:.75rem">Add Block</button>
          <div id="blocks-list" style="margin-top:1rem;font-size:.8rem;"></div>
        </div>
        <div class="card">
          <h2 style="margin-top:0">Set Rate</h2>
          <label>Unit</label>
          <select id="r-unit"><option>entire-villa</option><option>room-1</option><option>room-2</option><option>room-3</option><option>room-4</option><option>ballroom</option></select>
          <label>Nightly rate (villa/room)</label><input id="r-nightly" type="number" step="0.01">
          <label>Flat day rate (ballroom)</label><input id="r-flat" type="number" step="0.01">
          <div class="msg" id="rate-msg"></div>
          <button id="rate-btn" style="margin-top:.75rem">Save Rate</button>
        </div>
      </div>
    </main>
  </div>

  <dialog id="refund-dialog">
    <h3 style="margin-top:0">Refund Booking</h3>
    <div id="refund-preview" class="msg"></div>
    <label><input type="checkbox" id="refund-fm"> Force majeure (full refund)</label>
    <label>Override amount (optional)</label><input id="refund-override" type="number" step="0.01" style="width:100%">
    <label>Reason / note</label><input id="refund-reason" type="text" style="width:100%">
    <div class="msg err" id="refund-msg"></div>
    <div style="display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem;">
      <button class="secondary" id="refund-cancel">Close</button>
      <button class="danger" id="refund-confirm">Confirm Refund</button>
    </div>
  </dialog>

  <script type="module">
    const $ = (id) => document.getElementById(id);
    const api = async (url, opts) => {
      const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
      const body = await res.json().catch(() => ({}));
      if (res.status === 401) { showLogin(); throw new Error('unauthorized'); }
      if (!res.ok) throw new Error(body.error || 'request failed');
      return body;
    };
    const showLogin = () => { $('login').style.display = 'block'; $('app').style.display = 'none'; };
    const showApp = () => { $('login').style.display = 'none'; $('app').style.display = 'block'; loadBookings(); loadBlocks(); };

    // ---- auth ----
    $('login-btn').onclick = async () => {
      $('login-msg').textContent = '';
      try {
        await api('/api/admin/login', { method: 'POST', body: JSON.stringify({ email: $('login-email').value, password: $('login-pass').value }) });
        showApp();
      } catch (e) { $('login-msg').textContent = e.message; }
    };
    $('logout-btn').onclick = async () => { await api('/api/admin/logout', { method: 'POST' }).catch(() => {}); showLogin(); };

    // ---- bookings ----
    const fmtDates = (b) => b.kind === 'ballroom' ? b.check_in : `${b.check_in} → ${b.check_out}`;
    async function loadBookings() {
      const qs = new URLSearchParams();
      if ($('f-status').value) qs.set('status', $('f-status').value);
      if ($('f-unit').value) qs.set('unit', $('f-unit').value);
      if ($('f-from').value) qs.set('from', $('f-from').value);
      if ($('f-to').value) qs.set('to', $('f-to').value);
      try {
        const { bookings } = await api('/api/admin/bookings?' + qs);
        $('bookings-body').innerHTML = bookings.map((b) => `
          <tr>
            <td>${new Date(b.created_at).toLocaleDateString()}</td>
            <td>${b.first_name} ${b.last_name}<br><small>${b.email}</small></td>
            <td>${b.unit_slug}</td>
            <td>${fmtDates(b)}</td>
            <td>${b.guests}</td>
            <td>${b.currency} $${Number(b.amount).toLocaleString('en-US')}</td>
            <td><span class="pill s-${b.status}">${b.status}</span></td>
            <td><div class="row-actions">
              ${b.status === 'paid' ? `<button class="danger" data-refund="${b.id}">Refund</button>` : ''}
              ${(b.status === 'pending' || b.status === 'paid') ? `<button class="secondary" data-cancel="${b.id}">Cancel</button>` : ''}
            </div></td>
          </tr>`).join('') || '<tr><td colspan="8">No bookings.</td></tr>';
      } catch (e) { $('bookings-msg').textContent = e.message; }
    }
    $('f-apply').onclick = loadBookings;

    $('bookings-body').addEventListener('click', async (e) => {
      const cancelId = e.target.getAttribute('data-cancel');
      const refundId = e.target.getAttribute('data-refund');
      if (cancelId) {
        if (!confirm('Cancel this booking and free the dates? (No refund is issued.)')) return;
        try { await api('/api/admin/cancel', { method: 'POST', body: JSON.stringify({ id: cancelId }) }); loadBookings(); }
        catch (err) { alert(err.message); }
      }
      if (refundId) openRefund(refundId);
    });

    // ---- refund dialog ----
    const dlg = $('refund-dialog');
    let refundId = null;
    async function openRefund(id) {
      refundId = id; $('refund-msg').textContent = ''; $('refund-override').value = ''; $('refund-reason').value = ''; $('refund-fm').checked = false;
      await refreshPreview();
      dlg.showModal();
    }
    async function refreshPreview() {
      try {
        const qs = new URLSearchParams({ id: refundId, forceMajeure: String($('refund-fm').checked) });
        const { booking, computed } = await api('/api/admin/refund?' + qs);
        $('refund-preview').innerHTML = `Paid: <strong>$${booking.amount}</strong> · Policy refund: <strong>$${computed.amount}</strong> (${(computed.pct*100)}% — ${computed.reason})`;
      } catch (e) { $('refund-preview').textContent = e.message; }
    }
    $('refund-fm').onchange = refreshPreview;
    $('refund-cancel').onclick = () => dlg.close();
    $('refund-confirm').onclick = async () => {
      $('refund-msg').textContent = '';
      try {
        await api('/api/admin/refund', { method: 'POST', body: JSON.stringify({
          id: refundId, forceMajeure: $('refund-fm').checked,
          override: $('refund-override').value || undefined, reason: $('refund-reason').value || undefined,
        }) });
        dlg.close(); loadBookings();
      } catch (e) { $('refund-msg').textContent = e.message; }
    };

    // ---- blocks ----
    async function loadBlocks() {
      try {
        const { blocks } = await api('/api/admin/block');
        $('blocks-list').innerHTML = blocks.map((bl) =>
          `<div style="display:flex;justify-content:space-between;padding:.25rem 0;border-bottom:1px solid #f0f0f0;">
             <span>${bl.unit_id}: ${bl.from} → ${bl.to}${bl.reason ? ' (' + bl.reason + ')' : ''}</span>
             <button class="secondary" data-unblock="${bl.id}">✕</button></div>`).join('') || '<small>No blocks.</small>';
      } catch (e) { /* ignore */ }
    }
    $('blocks-list').addEventListener('click', async (e) => {
      const id = e.target.getAttribute('data-unblock');
      if (id) { try { await api('/api/admin/block?id=' + id, { method: 'DELETE' }); loadBlocks(); } catch (err) { alert(err.message); } }
    });
    $('block-btn').onclick = async () => {
      $('block-msg').textContent = '';
      try {
        await api('/api/admin/block', { method: 'POST', body: JSON.stringify({
          unit: $('b-unit').value, from: $('b-from').value, to: $('b-to').value, reason: $('b-reason').value,
        }) });
        $('block-msg').className = 'msg ok'; $('block-msg').textContent = 'Block added.'; loadBlocks();
      } catch (e) { $('block-msg').className = 'msg err'; $('block-msg').textContent = e.message; }
    };

    // ---- rates ----
    $('rate-btn').onclick = async () => {
      $('rate-msg').textContent = '';
      try {
        await api('/api/admin/set-rate', { method: 'POST', body: JSON.stringify({
          unit: $('r-unit').value,
          nightlyRate: $('r-nightly').value || undefined,
          flatDayRate: $('r-flat').value || undefined,
        }) });
        $('rate-msg').className = 'msg ok'; $('rate-msg').textContent = 'Rate saved.';
      } catch (e) { $('rate-msg').className = 'msg err'; $('rate-msg').textContent = e.message; }
    };

    // ---- boot: probe session ----
    (async () => {
      try { await api('/api/admin/bookings'); showApp(); }
      catch { showLogin(); }
    })();
  </script>
</body>
</html>
