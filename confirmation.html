<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Booking Confirmation – Soon Come Villa</title>
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link href="css/normalize.css" rel="stylesheet" type="text/css">
  <link href="css/webflow.css" rel="stylesheet" type="text/css">
  <link href="css/soon-come-villa-7c6e6b.webflow.css" rel="stylesheet" type="text/css">
  <link href="images/favicon.png" rel="shortcut icon" type="image/x-icon">
  <style>
    .conf-card{max-width:560px;margin:3rem auto;padding:2.5rem;border-radius:.75rem;box-shadow:0 10px 30px rgba(0,0,0,.08);text-align:center}
    .conf-status{font-size:1.25rem;font-weight:700;margin:1rem 0}
    .conf-paid{color:#127a00}.conf-pending{color:#b8860b}.conf-failed{color:#b00}
    .conf-summary{text-align:left;margin:1.5rem 0;border-top:1px solid #eee;padding-top:1rem}
    .conf-summary div{display:flex;justify-content:space-between;padding:.35rem 0}
    .spinner{display:inline-block;width:28px;height:28px;border:3px solid #eee;border-top-color:#d4af37;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="navbar-logo-center">
    <div role="banner" class="navbar-logo-center-container shadow-three w-nav">
      <div class="container"><div class="navbar-wrapper-three">
        <a href="index.html" class="navbar-brand-three w-nav-brand"><img src="images/SOON-COME-logo2.avif" width="360" alt="Soon Come Villa Logo" class="image-2"></a>
      </div></div>
    </div>
  </div>

  <section class="section-9">
    <div class="conf-card">
      <h1 class="heading-23" style="font-size:1.75rem;">Booking Confirmation</h1>
      <div id="conf-state"><div class="spinner"></div><div class="conf-status conf-pending">Confirming your payment…</div></div>
      <div class="conf-summary" id="conf-summary" style="display:none;"></div>
      <p id="conf-help" style="color:#777;display:none;">This can take a few moments. Keep this page open; we'll update automatically.</p>
      <div style="margin-top:1.5rem;"><a href="index.html" class="button w-button">Back to Home</a></div>
    </div>
  </section>

  <script type="module">
    const orderId = new URLSearchParams(location.search).get('order_id');
    const stateEl = document.getElementById('conf-state');
    const summaryEl = document.getElementById('conf-summary');
    const helpEl = document.getElementById('conf-help');

    function row(label, value) { return `<div><span>${label}</span><strong>${value}</strong></div>`; }

    function renderSummary(b) {
      const dates = b.kind === 'ballroom'
        ? `${b.checkIn}` : `${b.checkIn} → ${b.checkOut}`;
      summaryEl.innerHTML =
        row('Reference', b.order_id.slice(0, 12) + '…') +
        row('Booking', b.unit) +
        row(b.kind === 'ballroom' ? 'Event date' : 'Dates', dates) +
        row('Guests', b.guests) +
        row('Total', `${b.currency} $${b.amount.toLocaleString('en-US')}`);
      summaryEl.style.display = 'block';
    }
    function setStatus(kind, text) {
      const cls = kind === 'paid' ? 'conf-paid' : kind === 'failed' ? 'conf-failed' : 'conf-pending';
      const spinner = kind === 'pending' ? '<div class="spinner"></div>' : '';
      stateEl.innerHTML = `${spinner}<div class="conf-status ${cls}">${text}</div>`;
    }

    if (!orderId) {
      setStatus('failed', 'Missing booking reference.');
    } else {
      let attempts = 0;
      const poll = async () => {
        attempts++;
        try {
          const res = await fetch(`/api/booking/${encodeURIComponent(orderId)}`);
          if (res.ok) {
            const b = await res.json();
            renderSummary(b);
            if (b.status === 'paid') { setStatus('paid', '✓ Payment confirmed — you\'re booked!'); return; }
            if (b.status === 'refunded') { setStatus('paid', 'This booking has been refunded.'); return; }
            if (b.status === 'cancelled' || b.status === 'expired') { setStatus('failed', `This booking is ${b.status}.`); return; }
          }
        } catch { /* keep polling */ }
        // still pending
        if (attempts === 3) helpEl.style.display = 'block';
        if (attempts < 40) setTimeout(poll, 3000);
        else setStatus('failed', 'Still awaiting confirmation. Please contact us with your reference.');
      };
      poll();
    }
  </script>
</body>
</html>
